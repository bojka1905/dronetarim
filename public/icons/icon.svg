<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Arka plan -->
  <rect width="100" height="100" rx="20" fill="#16a34a"/>

  <!-- Kollar -->
  <line x1="50" y1="50" x2="22" y2="22" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="78" y2="22" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="22" y2="78" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="78" y2="78" stroke="white" stroke-width="7" stroke-linecap="round"/>

  <!-- Pervane diskleri -->
  <circle cx="22" cy="22" r="14" stroke="white" stroke-width="2.5" fill="white" fill-opacity="0.18"/>
  <circle cx="78" cy="22" r="14" stroke="white" stroke-width="2.5" fill="white" fill-opacity="0.18"/>
  <circle cx="22" cy="78" r="14" stroke="white" stroke-width="2.5" fill="white" fill-opacity="0.18"/>
  <circle cx="78" cy="78" r="14" stroke="white" stroke-width="2.5" fill="white" fill-opacity="0.18"/>

  <!-- Motor yuvaları -->
  <circle cx="22" cy="22" r="5" fill="white"/>
  <circle cx="78" cy="22" r="5" fill="white"/>
  <circle cx="22" cy="78" r="5" fill="white"/>
  <circle cx="78" cy="78" r="5" fill="white"/>

  <!-- Merkez gövde -->
  <rect x="40" y="40" width="20" height="20" rx="5" fill="white"/>

  <!-- Kamera -->
  <circle cx="50" cy="50" r="5"   fill="#14532d" opacity="0.7"/>
  <circle cx="50" cy="50" r="2.5" fill="white"   opacity="0.5"/>
</svg>
